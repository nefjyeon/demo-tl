<!DOCTYPE html>
<html lang="ko">
<head>
<!-- Required meta tags -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Bootstrap CSS -->
<link rel="stylesheet" href="bootstrap-4.6.2/dist/css/bootstrap.min.css">
<!-- Swiper CSS -->
<link rel="stylesheet" href="swiper-11.0.7/package/swiper-bundle.min.css">
<!-- only css -->
<link href="
https://cdn.jsdelivr.net/npm/reset-css@5.0.1/reset.min.css
" rel="stylesheet">
<!--<link rel="stylesheet" type="text/css" href="Pretendard-1.3.9/web/static/pretendard-dynamic-subset.css">-->
<link rel="stylesheet" type="text/css" href="css/common.css">
<link rel="stylesheet" type="text/css" href="css/contents.css">
<title>TripLink 관리자 페이지</title>
</head>
<body>
  <!--헤더 인클루드-->
  <header class="navbar navbar-expand-sm fixed-top d-flex justify-content-center align-items-center header"> 
  </header>

  <div class="container-fluid fadeInDown">
    <!--<main class="main-panel col-sm-12 col-md-12 col-xl-12 px-0 bd-content">-->
    <main class="main-panel col-sm-12 col-md-8 col-xl-8 px-0 bd-content form1to1-panel">
      
      <div class="sub-title pt-4 col-sm-12 d-flex justify-content-end">
        <p class="">Help Center > 1:1 문의</p>
      </div>
      <div class="titleCont">
        <h2>1:1 문의</h2>
      </div>
      <!--1:1 문의 영역 시작-->
      <form action="">
        <div class="wrap-form1to1 col-xl-12 col-xs-12 col-12">
          <div class="col-sm-12 mt-3 d-flex">
            <div class="table form-table write">
              <ul>
                <li class="col-sm-12 d-flex">
                  <div><span class="form1to1-title">* 문의유형</span></div>
                  <div class="custom-control form1to1-cont">
                    <select name="" id="" class="custom-select custom-select-sm">
                      <option selected hidden>문의유형을 선택하세요</option>
                      <option value="">일반</option>
                      <option value="">가입 및 탈퇴</option>
                      <option value="">정보변경</option>
                      <option value="">출금</option>
                      <option value="">기타</option>
                      <option value="">제휴/건의</option>
                    </select>
                  </div>
                </li>
                <li class="col-sm-12 d-flex">
                  <div><span class="form1to1-title">* 제목</span></div>
                  <div class="form1to1-cont">
                    <input type="text" id="form-title" class="form-title" name="form-title" maxlength='50' placeholder="제목을 입력하세요.">
                    <!-- 글자수제한 기능 -->
                    <div class="text-length t2">
                      <span class="text-length-cnt">0</span> /
                      <span class="text-length-total">50</span>
                    </div>
                  </div>
                </li>
                <li class="col-sm-12 d-flex">
                  <div><span class="form1to1-title">* 내용</span></div>
                  <div class="form1to1-cont">
                    <textarea id="form-q" class="form-q" name="form-q" maxlength='2000' placeholder="문의내용을 입력하세요."></textarea>
                    <!-- 글자수제한 기능 -->
                    <div class="text-length t3">
                      <span class="text-length-cnt">0</span> /
                      <span class="text-length-total">2,000</span>
                    </div>
                  </div>
                </li>
                <li class="col-sm-12 d-flex">
                  <div><span class="form1to1-title">* 첨부파일</span></div>
                  <div class="form1to1-cont">
                    <div class="add-file d-flex">
                      <input type="file" class="custom-file-input" id="fileSelect" name="filename" accept=".pptx,.hwp,.jpg,.png"><label class="custom-file-label" for="fileSelect">파일을 선택하세요</label>
                    </div>
                    <p class="form-in-caution">이미지 또는 문서파일 10MB이하 제한</p>
                  </div>
                </li>
              </ul>
            </div>
          </div>
          
          <div class="btn-group form-btn-group" role="group">
            <button type="button" class="fadeIn btn-outline-secondary btn-lg fourth" onclick="location.href='05_helpcenter-03_1to1.html'">취소</button>
            <button type="button" class="fadeIn btn-lg btn-secondary fourth" onclick="location.href='05_helpcenter-03_1to1-answer.html'">저장</button>
            <!-- 저장하였습니다 alert 추가 -->
          </div>
          
        </div>
      </form>
    </main>
  </div>
  <!--푸터 클라우드-->
  <footer class="footer d-flex justify-content-center"></footer>
  <!--bd-footer py-4 py-md-5 mt-5 bg-body-tertiary-->
  
    
  <!-- JavaScript Bundle with Popper -->
  <script src="js/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="bootstrap-4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="swiper-11.0.7/package/swiper-bundle.min.js"></script>
  <script type="text/javascript" src="js/common.js"></script>
  <script>
    
    var swiper = new Swiper(".category-big-swiper", {
      pagination: {
        el: ".swiper-pagination",
        type: "fraction",
      },
      navigation: {
        nextEl: ".swiper-button-next",
        prevEl: ".swiper-button-prev",
      },
    });
    
    var swiper2 = new Swiper(".category-mid-swiper", {
      pagination: {
        el: ".swiper-pagination",
        type: "fraction",
      },
      navigation: {
        nextEl: ".swiper-button-next",
        prevEl: ".swiper-button-prev",
      },
    });
    

    
    $(document).ready(function() {
      
      // 대시보드 - 상품링크
      // 상품 검색 필드 최상위 카테고리 필터링 클릭 이벤트
      $(".category-big>.d-flex a").on("click", function(){
        $.this = this;
        $(".category-big>.d-flex a").removeClass("active");
        $($.this).addClass("active");
      });
      // 상품 검색 필드 카테고리 하위 항목 버튼 다중선택 이벤트(토글버튼)
      $(".category-mid>button").on("click", function(){
        $.this = this;
        //$(".category-mid>button").removeClass("active");
        $($.this).toggleClass("active");
      });
      
      // 상품링크 - 선택된 하위 카테고리 키워드 개별 삭제 이벤트
      $(".keyword-list>.badge>i").click(function(){
        $.this = this;
        $($.this).parent("li").remove();
      });
      
      // 상품링크 - 선택된 하위 카테고리 키워드 초기화(전체 삭제) 이벤트
      $(".keyword-filtering>p>button").click(function(){
        $(".keyword-list>.badge").remove();
      });
      // 상품링크 - 메인화면 추천/인기상품 필터링 클릭 이벤트
      $(".table-filtering .btn-tab").on("click", function(){
        $.this = this;
        $(".table-filtering .btn-tab").removeClass("active");
        $($.this).addClass("active");
      });
      
    });
    
  </script>


</body>
</html>
