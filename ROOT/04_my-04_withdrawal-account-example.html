    var date = new Date();
    var today = new Date(date.getFullYear(), date.getMonth(), date.getDate());

    $('.input-daterange').datepicker({

      //startDate: date,
      maxViewMode: 0,
      language: "ko",
      todayHighlight: false,

      //defaultViewDate:	today,
