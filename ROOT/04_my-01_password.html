<body>

        <!-- <h1><img src="imgs/logo-bl.png" alt=""></h1> -->

      <div class="form-login form-join fadeIn first">
        <form action="">

              <div class="col-sm-12 title-formin">* 비밀번호</div>

  <!--<div id="terms1modal" class="modal fade" data-keyboard="false"  tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">-->
      
  <!--푸터 클라우드-->
  <footer class="footer d-flex justify-content-center"></footer>
  <!--bd-footer py-4 py-md-5 mt-5 bg-body-tertiary-->
  
    
  <!-- JavaScript Bundle with Popper -->
  <script src="js/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="bootstrap-4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="swiper-11.0.7/package/swiper-bundle.min.js"></script>
  <script type="text/javascript" src="js/common.js"></script>
  <script>
    var swiper = new Swiper(".mySwiper", {
      //slidesPerView: 1,
      //spaceBetween: 10,
      //direction: 'vertical',
      loop: true,
      loopAdditionalSlides : 1,
      autoplay: {
        delay: 2500,
        disableOnInteraction: false,
      },
      /*pagination: {
        el: ".swiper-pagination",
        clickable: true,
      },*/
      navigation: {
        nextEl: ".swiper-button-next",
        prevEl: ".swiper-button-prev",
      },
      breakpoints: {
        576: {
          slidesPerView: 1,
          spaceBetween:0,
        },
        640: {
          slidesPerView: 2,
          spaceBetween: 20,
        },
/*        768: {
          slidesPerView: 3,
          spaceBetween: 40,
        },*/
        1024: {
          slidesPerView: 4,
          spaceBetween: 38,
        },
        /*1400: {
          slidesPerView: 4,
          spaceBetween: 40,
        },*/
      },
    });
    
    $(document).ready(function() {
      
      // 대시보드 메인화면 추천/인기상품 필터링 클릭 이벤트
      $(".filtering-tag>ul>li").on("click", function(){
        $.this = this;
        $(".filtering-tag>ul>li").removeClass("active");
        $($.this).addClass("active");
      });
      
      
      // 약관 동의 전체 체크 기능
      $("#alltermsOk").click(function() {
				if($("#alltermsOk").is(":checked")) $("input[name=allterms]").prop("checked", true);
				else $("input[name=allterms]").prop("checked", false);
			});
			
			$("input[name=allterms]").click(function() {
				var total = $("input[name=allterms]").length;
				var checked = $("input[name=allterms]:checked").length;
				
				if(total != checked) $("#alltermsOk").prop("checked", false);
				else $("#alltermsOk").prop("checked", true); 
			});
      
    });
    
  </script>


</body>
</html>
