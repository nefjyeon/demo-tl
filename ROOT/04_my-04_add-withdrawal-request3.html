  <!-- JavaScript Bundle with Popper -->
  <script src="js/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="bootstrap-4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="swiper-11.0.7/package/swiper-bundle.min.js"></script>
  <script type="text/javascript" src="js/common.js"></script>
  <script>
    
    var swiper = new Swiper(".category-big-swiper", {
      pagination: {
        el: ".swiper-pagination",
        type: "fraction",
      },
      navigation: {
        nextEl: ".swiper-button-next",
        prevEl: ".swiper-button-prev",
      },
    });
    
    var swiper2 = new Swiper(".category-mid-swiper", {
      pagination: {
        el: ".swiper-pagination",
        type: "fraction",
      },
      navigation: {
        nextEl: ".swiper-button-next",
        prevEl: ".swiper-button-prev",
      },
    });
    

    
    $(document).ready(function() {
      
      // 대시보드 - 상품링크
      // 상품 검색 필드 최상위 카테고리 필터링 클릭 이벤트
      $(".category-big>.d-flex a").on("click", function(){
        $.this = this;
        $(".category-big>.d-flex a").removeClass("active");
        $($.this).addClass("active");
      });
      // 상품 검색 필드 카테고리 하위 항목 버튼 다중선택 이벤트(토글버튼)
      $(".category-mid>button").on("click", function(){
        $.this = this;
        //$(".category-mid>button").removeClass("active");
        $($.this).toggleClass("active");
      });
      
      // 상품링크 - 선택된 하위 카테고리 키워드 개별 삭제 이벤트
      $(".keyword-list>.badge>i").click(function(){
        $.this = this;
        $($.this).parent("li").remove();
      });
      
      // 상품링크 - 선택된 하위 카테고리 키워드 초기화(전체 삭제) 이벤트
      $(".keyword-filtering>p>button").click(function(){
        $(".keyword-list>.badge").remove();
      });
      // 상품링크 - 메인화면 추천/인기상품 필터링 클릭 이벤트
      $(".table-filtering .btn-tab").on("click", function(){
        $.this = this;
        $(".table-filtering .btn-tab").removeClass("active");
        $($.this).addClass("active");
      });
      
    });
    
  </script>


</body>
