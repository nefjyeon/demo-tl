<!DOCTYPE html>
<html lang="ko">
<head>
<!-- Required meta tags -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Bootstrap CSS -->
<link rel="stylesheet" href="bootstrap-4.6.2/dist/css/bootstrap.min.css">
<!-- Swiper CSS -->
<link rel="stylesheet" href="swiper-11.0.7/package/swiper-bundle.min.css">
<!-- only css -->
<link href="
https://cdn.jsdelivr.net/npm/reset-css@5.0.1/reset.min.css
" rel="stylesheet">
<link rel="stylesheet" type="text/css" href="css/common.css">
<link rel="stylesheet" type="text/css" href="css/contents.css">
<title>TripLink 관리자 페이지</title>
</head>
<body>
  <!--헤더 인클루드-->
  <header class="navbar navbar-expand-sm fixed-top d-flex justify-content-center align-items-center">
    
  </header>

  <div class="container-fluid fadeInDown my">
    <main class="main-panel col-sm-12 col-md-8 col-xl-8 px-0 login-panel joinform-panel my">
      <div class="sub-title pt-4 d-flex justify-content-end">
        <p class="">MY > 활동사이트/앱 추가 > 상세</p>
      </div>
      <div class="titleCont">
        <h2>활동사이트/앱 추가</h2>
      </div>

      <div class="form-login form-join fadeIn first">
        <form action="">
          <fieldset>
            <div class="form-group row">
              <div class="col-sm-12 title-formin">* 분류</div>
              <div class="col-sm-12">
                <input type="text" class="fadeIn third disabled" name="site" placeholder="사이트" disabled>
              </div>
            </div>
            <div class="form-group row">
              <div class="col-sm-12 title-formin">* 사이트/앱 이름</div>
              <div class="col-sm-12">
                <input type="text" class="fadeIn third disabled" name="site" placeholder="유튜브" disabled>
              </div>
            </div>
            <div class="form-group row activity-text">
              <div class="col-sm-12 title-formin">* URL</div>
              <div class="col-sm-12">
                <div class="form-floating">
                  <textarea class="form-control disabled" placeholder="https://www.youtube.com/channel/UCfpaSruWW3S4dibonKXENjA" id="floatingTextarea2" style="height: 100px" disabled></textarea>
                </div>
              </div>
            </div>
            <div class="form-group row activity-text">
              <div class="col-sm-12 title-formin">* 설명</div>
              <div class="col-sm-12">
                <div class="form-floating">
                  <textarea class="form-control disabled" placeholder="안녕하세요. 쯔양입니다. 잘부탁드립니다." id="floatingTextarea2" style="height: 100px" disabled></textarea>
                </div>
              </div>
            </div>
            <div class="form-group row">
              <div class="col-sm-12 title-formin">* 스크린샷</div>
              <div class="col-sm-12 d-flex mb-2 align-items-center">
                <div class="col-2 col-sm-1 d-inline-block px-0  file-btn">내 PC</div>
                <div class="col-sm-11 px-0 d-flex justify-content-end file">
                  10MB 이하 파일
                </div>
              </div>
              <div class="col-sm-12 my-file disabled">
                <input type="file" class="custom-file-input disabled" id="fileSelect" name="screenshot" accept=".pptx,.hwp,.jpg,.png" disabled>
                <label class="custom-file-label selected disabled" for="fileSelect" disabled>유튜브관리화면.jpg</label>
                <!-- <label class="custom-file-label form-control selected" for="fileSelect" placeholder="파일을 마우스로 끌어오세요."></label> -->
              </div>
            </div>
            <div class="form-group row">
              <div class="col-sm-12 title-formin">* 기타증빙서류</div>
              <div class="col-sm-12 d-flex mb-2 align-items-center">
                <div class="col-2 col-sm-1 d-inline-block px-0  file-btn">내 PC</div>
                <div class="col-sm-11 px-0 d-flex justify-content-end file">
                  10MB 이하 파일
                </div>
              </div>
              <div class="col-sm-12 my-file disabled">
                <input type="file" class="custom-file-input disabled" id="fileSelect" name="file-etc" accept=".pptx,.hwp,.jpg,.png" disabled>
                <label class="custom-file-label selected disabled" for="fileSelect" disabled>파일을 선택하세요</label>
                <!-- <label class="custom-file-label form-control selected" for="fileSelect" placeholder="파일을 마우스로 끌어오세요."></label> -->
              </div>
            </div>
            <div class="form-group row">
              <div class="col-xs-12 col-sm-12 title-formin">* 상태</div>
              <div class="col-2 col-sm-2 account04">
                <input type="text" id="" class="fadeIn third disabled center" name="" placeholder="대기" disabled>
              </div>
              <div class="col-10 col-sm-10 account02">
                <input type="text" id="" class="fadeIn third disabled" name="" placeholder="반려 시 사유가 표시됩니다." disabled>
              </div>
            </div>
          </fieldset>
          <div class="form-group row d-flex col-sm-12 mb-3 mt-2 px-0 activity-text">
            <ul class="explanation">
              <li class="mb-1">등록하지 않은 채널에서의 활동은 부정행위(어뷰징)으로 간주될 수 있으며 <br>계정정지 및 수익금 환수가 진행될 수 있습니다.
              </li>
              <li class="mb-1">활동사이트/앱의 심사는 영업일 기준 1~3일 소요됩니다.</li>
            </ul>
          </div>            
          <div class="btn-group form-btn-group" role="group">              
            <button type="button" class="fadeIn btn-lg btn-secondary fourth" data-toggle="modal" data-target="">목록</button>
          </div>
        </form>
      </div>
    </main>
  </div>
  <div class="modal fade" id="save-btn" tabindex="-1" aria-labelledby="save-btn" aria-hidden="true">
    <div class="modal-dialog withdrawal-modal">
      <div class="modal-content withdrawal-modal">
        <div class="modal-header">
          <!-- <h5 class="modal-title">회원탈퇴신청</h5> -->
          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <p>저장하였습니다.<br>
            담당자의 심사 후 적용됩니다.</p>
        </div>
        <div class="modal-footer">          
          <button type="button" class="btn btn-secondary" data-dismiss="modal">확인</button>
        </div>
      </div>
    </div>
  </div>
  <!--푸터 클라우드-->
  <footer class="footer d-flex justify-content-center"></footer>
  <!--bd-footer py-4 py-md-5 mt-5 bg-body-tertiary-->
  
    
  <!-- JavaScript Bundle with Popper -->
  <script src="js/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="bootstrap-4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="swiper-11.0.7/package/swiper-bundle.min.js"></script>
  <script type="text/javascript" src="js/common.js"></script>
  <script>
    
    var swiper = new Swiper(".category-big-swiper", {
      pagination: {
        el: ".swiper-pagination",
        type: "fraction",
      },
      navigation: {
        nextEl: ".swiper-button-next",
        prevEl: ".swiper-button-prev",
      },
    });
    
    var swiper2 = new Swiper(".category-mid-swiper", {
      pagination: {
        el: ".swiper-pagination",
        type: "fraction",
      },
      navigation: {
        nextEl: ".swiper-button-next",
        prevEl: ".swiper-button-prev",
      },
    });
    

    
    $(document).ready(function() {
      
      // 대시보드 - 상품링크
      // 상품 검색 필드 최상위 카테고리 필터링 클릭 이벤트
      $(".category-big>.d-flex a").on("click", function(){
        $.this = this;
        $(".category-big>.d-flex a").removeClass("active");
        $($.this).addClass("active");
      });
      // 상품 검색 필드 카테고리 하위 항목 버튼 다중선택 이벤트(토글버튼)
      $(".category-mid>button").on("click", function(){
        $.this = this;
        //$(".category-mid>button").removeClass("active");
        $($.this).toggleClass("active");
      });
      
      // 상품링크 - 선택된 하위 카테고리 키워드 개별 삭제 이벤트
      $(".keyword-list>.badge>i").click(function(){
        $.this = this;
        $($.this).parent("li").remove();
      });
      
      // 상품링크 - 선택된 하위 카테고리 키워드 초기화(전체 삭제) 이벤트
      $(".keyword-filtering>p>button").click(function(){
        $(".keyword-list>.badge").remove();
      });
      // 상품링크 - 메인화면 추천/인기상품 필터링 클릭 이벤트
      $(".table-filtering .btn-tab").on("click", function(){
        $.this = this;
        $(".table-filtering .btn-tab").removeClass("active");
        $($.this).addClass("active");
      });
      
    });
    
  </script>


</body>
</html>
