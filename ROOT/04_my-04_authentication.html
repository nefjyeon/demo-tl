<!DOCTYPE html>
<html lang="ko">
<head>
<!-- Required meta tags -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Bootstrap CSS -->
<link rel="stylesheet" href="bootstrap-4.6.2/dist/css/bootstrap.min.css">
<!-- Swiper CSS -->
<link rel="stylesheet" href="swiper-11.0.7/package/swiper-bundle.min.css">
<!-- only css -->
<link href="
https://cdn.jsdelivr.net/npm/reset-css@5.0.1/reset.min.css
" rel="stylesheet">
<link rel="stylesheet" type="text/css" href="css/common.css">
<link rel="stylesheet" type="text/css" href="css/contents.css">
<title>TripLink 회원가입</title>
</head>
<body>
  <!--헤더 인클루드-->
  <header class="navbar navbar-expand-sm fixed-top d-flex justify-content-center align-items-center">
    
  </header>

  <div class="container-fluid fadeInDown my">
    <main class="main-panel col-sm-12 col-md-8 col-xl-8 px-0 login-panel joinform-panel my">
      <div class="sub-title mb-5 pt-4 pb-4 d-flex justify-content-end">
        <p class="">MY > 실명인증</p>
      </div>
      <div class="fadeIn first col-sm-12 mt-3 pt-4">
        <div class="row">
          <div class="col-sm-6 mb-3 mb-sm-0">
            <div class="card">
              <div class="card-body">
                <div class="pb-3 col-sm-12 d-flex align-items-center justify-content-center">
                  <div class="card-img-box py-4 px-5">
                    <img src="imgs/sumTabImg.png">
                  </div>
                </div>
                <p class="my-card-title mb-3">개인</p>
                <p class="card-text mb-3">개인회원의<br>본인(실명)확인</p>
                <a href="#" class="btn certification-card col-sm-8 py-2">인증하기</a>
              </div>
            </div>
          </div>
          <div class="col-sm-6">
            <div class="card">
              <div class="card-body">
                <div class="pb-3 col-sm-12 d-flex align-items-center justify-content-center">
                  <div class="card-img-box py-4 px-5">
                    <img src="imgs/sumTabImg.png">
                  </div>
                </div>
                <p class="my-card-title mb-3">사업자</p>
                <p class="card-text mb-3">
                  세금계산서 발행이 가능한<br>
                  개인사업자 또는 법인사업자
                </p>
                <a href="#" class="btn certification-card col-sm-8 py-2">신청하기</a>
              </div>
            </div>
          </div>
        </div>
      </div>      
    </main>
  </div> 
      
  <!--푸터 클라우드-->
  <footer class="footer d-flex justify-content-center"></footer>
  <!--bd-footer py-4 py-md-5 mt-5 bg-body-tertiary-->
  
    
  <!-- JavaScript Bundle with Popper -->
  <script src="js/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="bootstrap-4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="swiper-11.0.7/package/swiper-bundle.min.js"></script>
  <script type="text/javascript" src="js/common.js"></script>
  <script>
    var swiper = new Swiper(".mySwiper", {
      //slidesPerView: 1,
      //spaceBetween: 10,
      //direction: 'vertical',
      loop: true,
      loopAdditionalSlides : 1,
      autoplay: {
        delay: 2500,
        disableOnInteraction: false,
      },
      /*pagination: {
        el: ".swiper-pagination",
        clickable: true,
      },*/
      navigation: {
        nextEl: ".swiper-button-next",
        prevEl: ".swiper-button-prev",
      },
      breakpoints: {
        576: {
          slidesPerView: 1,
          spaceBetween:0,
        },
        640: {
          slidesPerView: 2,
          spaceBetween: 20,
        },
/*        768: {
          slidesPerView: 3,
          spaceBetween: 40,
        },*/
        1024: {
          slidesPerView: 4,
          spaceBetween: 38,
        },
        /*1400: {
          slidesPerView: 4,
          spaceBetween: 40,
        },*/
      },
    });
    
    
  </script>


</body>
</html>
