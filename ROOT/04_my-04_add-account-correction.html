<!DOCTYPE html>
<html lang="ko">
<head>
<!-- Required meta tags -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Bootstrap CSS -->
<link rel="stylesheet" href="bootstrap-4.6.2/dist/css/bootstrap.min.css">
<!-- Swiper CSS -->
<link rel="stylesheet" href="swiper-11.0.7/package/swiper-bundle.min.css">
<!-- only css -->
<link href="
https://cdn.jsdelivr.net/npm/reset-css@5.0.1/reset.min.css
" rel="stylesheet">
<link rel="stylesheet" type="text/css" href="css/common.css">
<link rel="stylesheet" type="text/css" href="css/contents.css">
<title>TripLink 관리자 페이지</title>
</head>
<body>
  <!--헤더 인클루드-->
  <header class="navbar navbar-expand-sm fixed-top d-flex justify-content-center align-items-center">
    
  </header>

  <div class="container-fluid fadeInDown my">
    <main class="main-panel col-sm-12 col-md-8 col-xl-8 px-0 login-panel joinform-panel my">
      <div class="sub-title mb-5 pt-4 d-flex justify-content-end">
        <p class="">MY > 출금/계좌관리 > 계좌관리 > 내계좌 수정</p>
      </div>

      <div class="form-login form-join fadeIn first">
        <form action="">
          <fieldset>            
            <div class="form-group row">
              <div class="col-sm-12 title-formin">* 예금주명</div>
              <div class="col-sm-12">
                <input type="text" id="" class="fadeIn second" name="" placeholder="예금주명 입력">
              </div>
            </div>
            <div class="form-group row">
              <div class="col-sm-12 title-formin">* 생년월일 또는 사업자 번호</div>
              <div class="col-sm-12">
                <input type="text" id="" class="fadeIn second" name="" placeholder="생년월일 6자리 또는 사업자번호 10자리">
              </div>
            </div>
            <div class="form-group row">
              <div class="col-sm-12 title-formin">* 금융기관/은행명</div>
              <div class="col-sm-12 custom-control">
                <select name="" id="" class="custom-select custom-select-sm">
                  <option value="" selected>KB국민은행</option>
                  <option value="">하나은행</option>
                  <option value="">신한은행</option>
                  <option value="">우리은행</option>
                  <option value="">NH농협은행</option>
                  <option value="">IBK기업은행</option>
                  <option value="">KDB산업은행</option>
                  <option value="">SC제일은행</option>
                  <option value="">BNK부산은행</option>
                  <option value="">DGB대구은행</option>
                  <option value="">한국씨티은행</option>
                  <option value="">수협은행</option>
                  <option value="">BNK경남은행</option>
                  <option value="">카카오뱅크</option>
                  <option value="">광주은행</option>
                  <option value="">토스뱅크</option>
                  <option value="">전북은행</option>
                  <option value="">케이뱅크</option>
                  <option value="">제주은행</option>
                </select>
              </div>
            </div>
            <div class="form-group row">
              <div class="col-sm-12 title-formin">* 계좌번호</div>
              <div class="col-sm-12">
                <input type="text" id="" class="fadeIn second" name="" placeholder="숫자만 입력">
              </div>
            </div>
            <div class="form-group row">
              <div class="col-sm-12 title-formin">* 통장사본</div>
              <div class="col-sm-12 d-flex mb-2 align-items-center">
                <div class="col-2 col-sm-1 d-inline-block px-0  file-btn">내 PC</div>
                <div class="col-sm-11 px-0 d-flex justify-content-end file">
                  10MB 이하 파일
                </div>
              </div>
              <div class="col-sm-12 my-file">
                <input type="file" class="custom-file-input" id="fileSelect" name="file-bankbook" accept=".pptx,.hwp,.jpg,.png">
                <label class="custom-file-label selected" for="fileSelect">통장사본.pdf (3.01MB)</label>
                <!-- <label class="custom-file-label form-control selected" for="fileSelect" placeholder="파일을 마우스로 끌어오세요."></label> -->
              </div>
            </div>
            <div class="form-group row d-flex col-sm-12 mb-3 mt-2 px-0 activity-text">
              <ul class="explanation">
                <li class="mb-1">계좌정보는 담당자의 심사 후 반영 됩니다. (영업일 기준 1~3일 내)</li>
              </ul>
            </div>   
            <div class="btn-group form-btn-group" role="group">                
              <button type="button" class="fadeIn btn-outline-secondary btn-lg fourth" onclick="location.href='https://design.realclick.co.kr/triplink-dash/04_my-04_withdrawal-account.html'">취소</button>
              <button type="button" class="fadeIn btn-lg btn-secondary fourth" onclick="location.href='https://design.realclick.co.kr/triplink-dash/04_my-04_withdrawal-account.html'">저장</button>
              <!--저장 모달 -> 
              계좌정보가 저장 되었습니다.
              심사 후 반영예정 입니다.
              -->
            </div>
          </fieldset>
        </form>
      </div>
    </main>
  </div>
  <!--푸터 클라우드-->
  <footer class="footer d-flex justify-content-center"></footer>
  <!--bd-footer py-4 py-md-5 mt-5 bg-body-tertiary-->
  
    
  <!-- JavaScript Bundle with Popper -->
  <script src="js/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="bootstrap-4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="swiper-11.0.7/package/swiper-bundle.min.js"></script>
  <script type="text/javascript" src="js/common.js"></script>
  <script>
    
    var swiper = new Swiper(".category-big-swiper", {
      pagination: {
        el: ".swiper-pagination",
        type: "fraction",
      },
      navigation: {
        nextEl: ".swiper-button-next",
        prevEl: ".swiper-button-prev",
      },
    });
    
    var swiper2 = new Swiper(".category-mid-swiper", {
      pagination: {
        el: ".swiper-pagination",
        type: "fraction",
      },
      navigation: {
        nextEl: ".swiper-button-next",
        prevEl: ".swiper-button-prev",
      },
    });
    

    
    $(document).ready(function() {
      
      // 대시보드 - 상품링크
      // 상품 검색 필드 최상위 카테고리 필터링 클릭 이벤트
      $(".category-big>.d-flex a").on("click", function(){
        $.this = this;
        $(".category-big>.d-flex a").removeClass("active");
        $($.this).addClass("active");
      });
      // 상품 검색 필드 카테고리 하위 항목 버튼 다중선택 이벤트(토글버튼)
      $(".category-mid>button").on("click", function(){
        $.this = this;
        //$(".category-mid>button").removeClass("active");
        $($.this).toggleClass("active");
      });
      
      // 상품링크 - 선택된 하위 카테고리 키워드 개별 삭제 이벤트
      $(".keyword-list>.badge>i").click(function(){
        $.this = this;
        $($.this).parent("li").remove();
      });
      
      // 상품링크 - 선택된 하위 카테고리 키워드 초기화(전체 삭제) 이벤트
      $(".keyword-filtering>p>button").click(function(){
        $(".keyword-list>.badge").remove();
      });
      // 상품링크 - 메인화면 추천/인기상품 필터링 클릭 이벤트
      $(".table-filtering .btn-tab").on("click", function(){
        $.this = this;
        $(".table-filtering .btn-tab").removeClass("active");
        $($.this).addClass("active");
      });
      
    });
    
  </script>


</body>
</html>
