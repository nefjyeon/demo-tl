  <script>

    
    $(document).ready(function() {
      
      var date = new Date();
      var today = new Date(date.getFullYear(), date.getMonth(), date.getDate());

      $('.input-daterange').datepicker({
        format: "yyyy-mm-dd",
        //startDate: date,
        maxViewMode: 0,
        language: "ko",
        todayHighlight: false,
        startView: 1,
        disableTouchKeyboard: true,
        //daysOfWeekDisabled: [0, 6],
        //todayHighlight: true,
        //startDate: today,
        //endDate:'+4d',
        //multidateSeparator: false,
        //defaultViewDate: { year: new Date().getFullYear(), month: new Date().getMonth(), day: new Date().getDate() }
        //defaultViewDate:	today,
        //daysOfWeekHighlighted: [0,6],
      });
      $('.input-daterange input').attr("readonly",true);
      
      // 대시보드 - 리포트 기간 버튼 선택 이벤트
      $(".onclick-date>.btn").on("click", function(){
        $.this = this;
        $(".onclick-date>.btn").removeClass("active");
        $($.this).addClass("active");
      });
      
    });
    
  </script>
